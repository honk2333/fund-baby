name: Feishu Fund Push

on:
  schedule:
    # 交易日 9:30, 10:30, 11:30, 12:30, 13:30, 14:30 推送 (UTC 1:30 - 6:30)
    - cron: '30 1,2,3,4,5,6 * * 1-5'
    # 交易日 15:00 收盘推送 (UTC 7:00)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Trigger Feishu Push
        env:
          FEISHU_HOOK_URL: ${{ secrets.FEISHU_HOOK_URL }}
          FUND_CODES: ${{ secrets.FUND_CODES }}
          PUSH_TITLE: "养基小宝 - 定时推送"
        run: |
          if [ -z "$FEISHU_HOOK_URL" ]; then
            echo "Error: Missing required secret FEISHU_HOOK_URL"
            exit 1
          fi
          node scripts/push.js
