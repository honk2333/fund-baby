name: Feishu Fund Push

on:
  schedule:
    # 交易日 9:30, 10:30, 11:30, 12:30, 13:30, 14:30 推送 (UTC 1:30 - 6:30)
    - cron: '30 1,2,3,4,5,6 * * 1-5'
    # 交易日 15:00 收盘推送 (UTC 7:00)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Feishu Push
        run: |
          # 请在 GitHub Repo Settings -> Secrets and variables -> Actions 中配置以下变量:
          # FEISHU_HOOK_URL: 您的飞书 Webhook 地址
          # FUND_CODES: 您想要推送的基金代码，逗号分隔，例如 004253,110022
          # APP_URL: 您部署后的网站地址，例如 https://fund-baby.vercel.app
          
          HOOK_URL="${{ secrets.FEISHU_HOOK_URL }}"
          CODES="${{ secrets.FUND_CODES }}"
          BASE_URL="${{ secrets.APP_URL }}"
          
          if [ -z "$HOOK_URL" ] || [ -z "$BASE_URL" ]; then
            echo "Error: Missing required secrets (FEISHU_HOOK_URL or APP_URL)"
            exit 1
          fi
          
          # If CODES is empty, the API will default to app/data/my-funds.json
          curl -X POST "$BASE_URL/api/feishu-push" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg hook "$HOOK_URL" --arg codes "$CODES" --arg title "养基小宝 - 定时推送" \
                  '{hook: $hook, codes: (if $codes == "" then null else $codes end), title: $title}')"
